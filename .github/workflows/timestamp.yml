name: OpenTimestamps Auto-Stamp

on:
  push:
    branches: [ "main"]
    paths-ignore:
      - 'ots-proofs/**'

permissions:
  contents: write

concurrency:
  group: timestamp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  timestamp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install OpenTimestamps
        run: pip install opentimestamps-client

      - name: Create timestamp proof for this commit
        run: |
          mkdir -p ots-proofs
          COMMIT_HASH=$(git rev-parse HEAD)
          TARGET_FILE="ots-proofs/$COMMIT_HASH.txt"

          echo "$COMMIT_HASH" > "$TARGET_FILE"

          # Always stamp the commit hash
          ots stamp "$TARGET_FILE"

          echo "Stamped commit: $COMMIT_HASH"

      - name: Commit the new proof
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add ots-proofs/
          if git diff --cached --quiet; then
            echo "No new proof to commit"
            exit 0
          fi

          git commit -m "[Auto] OpenTimestamps proof for commit $(git rev-parse --short HEAD)"
          git push origin HEAD:main